<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema - Nossa Escola</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <header class="header-login">
        <a href="index.html" class="btn-voltar">← Voltar ao site</a>
        <div class="logo-login">
            <img src="IMG/LOGO.png" alt="Logo" width="30">
            <h1>NossaEscola <small>GESTÃO EDUCACIONAL</small></h1>
        </div>
    </header>

    <main class="bg-login">
        <div class="card-login">
            <h2>Acessar Sistema</h2>
            <p class="subtitle-login">Entre com suas credenciais para acessar a plataforma</p>

            <form class="form-login" action="#" method="POST">
                <div class="form-grupo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-grupo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primario btn-entrar">Entrar</button>
            </form>

            <div class="demo-section">
                <p class="demo-title">Acesso rápido para demonstração</p>
                <div class="demo-grid">
                    
                    <button type="button" class="card-demo">
                        <strong> Aluno</strong>
                        <span>Selecionar cursos de interesse</span>
                    </button>
                    
                    <button type="button" class="card-demo">
                        <strong> Professor</strong>
                        <span>Ver turmas e alunos</span>
                    </button>
                    
                    <button type="button" class="card-demo">
                        <strong> Secretaria</strong>
                        <span>Gerenciar matrículas</span>
                    </button>
                    
                    <button type="button" class="card-demo">
                        <strong> Gestão</strong>
                        <span>Configurar distribuição</span>
                    </button>

                </div>
                <p class="demo-footer">Senha para todos os usuários demo: 123456</p>
            </div>
        </div>
    </main>

</body>
</html>
